name: Deploy Public Docs

on:
  push:
    branches:
      - master
      - dev
  repository_dispatch:
    types: [api-spec-updated]
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to deploy
        required: true
        type: choice
        options:
          - master
          - dev

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_BRANCH: ${{ github.event_name == 'workflow_dispatch' && inputs.branch || (github.event_name == 'repository_dispatch' && github.event.client_payload.branch || github.ref_name) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_BRANCH }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: npm

      - name: Install toolchain
        run: npm ci

      - name: Build documentation
        run: ./generate.sh
        env:
          STAGING_DOCS: ${{ env.DEPLOY_BRANCH == 'dev' && 'true' || 'false' }}

      - name: Build MCP spec
        run: |
          node ./scripts/build-mcp-openapi.mjs
          node ./scripts/prune-unused-mcp-schemas.mjs artifacts/intermediate/openapi-mcp.filtered.json
          ./node_modules/.bin/redocly bundle artifacts/intermediate/openapi-mcp.filtered.json --output openapi-v3.0.mcp.yaml
          cp openapi-v3.0.mcp.yaml html/openapi-v3.0.mcp.yaml
          cp openapi-v3.0.mcp.yaml artifacts/release/openapi-v3.0.mcp.yaml
          tar -czf artifacts/release/html-docs.tar.gz html

      - name: Upload generated public spec
        uses: actions/upload-artifact@v4
        with:
          name: public-openapi-${{ github.sha }}
          path: openapi-v3.0.yaml
          if-no-files-found: error

      - name: Upload generated MCP spec
        uses: actions/upload-artifact@v4
        with:
          name: mcp-openapi-${{ github.sha }}
          path: openapi-v3.0.mcp.yaml
          if-no-files-found: error

      - name: Upload validation reports
        uses: actions/upload-artifact@v4
        with:
          name: validation-reports-${{ github.sha }}
          path: artifacts/validation

      - name: Upload release bundle
        uses: actions/upload-artifact@v4
        with:
          name: release-bundle-${{ github.sha }}
          path: artifacts/release

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy html --project-name=${{ env.DEPLOY_BRANCH == 'master' && secrets.CLOUDFLARE_PROJECT_NAME || secrets.CLOUDFLARE_PROJECT_NAME_DEV }} --branch=${{ env.DEPLOY_BRANCH }}
