openapi: 3.0.3

info:
  title: Formaloo API Documentation
  version: 3.0.0
  description:
    $ref: ./docs/v3.0/intro.md
  termsOfService: https://www.formaloo.com/terms
  contact:
    name: Support
    email: dev@formaloo.com
    url: https://help.formaloo.com/en/

externalDocs:
  description: Find out more
  url: https://help.formaloo.com/en/

servers:
  - url: https://api.formaloo.me
    description: Formaloo Server

components:
  securitySchemes:
    ApiKeyAuthentication:
      type: apiKey
      in: header
      name: x-api-key
      description: Your API Key from the Formaloo dashboard.
    JwtAuthentication:
      type: apiKey
      in: header
      name: Authorization
      description: Use `JWT {Authorization Token}` for protected Formaloo API requests.
